<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LIBヒアリング">
  <meta name="theme-color" content="#1a1a1a">
  <title>LIB 商品ヒアリング</title>
  <link rel="apple-touch-icon" href="lib-icon.png">
  <link rel="icon" href="lib-icon.png">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }

    /* ===== パスワードゲート ===== */
    #lib-gate { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: flex-start; justify-content: center; padding: 80px 20px; box-sizing: border-box; }
    .lib-gate__inner { width: 100%; max-width: 340px; }
    .lib-gate__logo { font-family: 'Times New Roman', serif; font-size: 32px; letter-spacing: 0.2em; text-align: center; margin-bottom: 40px; font-weight: 400; color: #1a1a1a; }
    .lib-gate__lead { font-size: 13px; color: #666; text-align: center; margin-bottom: 24px; letter-spacing: 0.05em; }
    .lib-gate__input { width: 100%; padding: 14px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
    .lib-gate__input:focus { outline: none; border-color: #1a1a1a; }
    .lib-gate__btn { width: 100%; padding: 14px; margin-top: 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; font-size: 14px; letter-spacing: 0.1em; cursor: pointer; font-family: inherit; }
    .lib-gate__err { color: #a03b2e; font-size: 13px; text-align: center; margin-top: 12px; }
    #app-iframe { display: none; }

    /* ===== ローディング (web app の .loading と完全一致) ===== */
    #lib-loading { position: fixed; inset: 0; background: rgba(255,255,255,.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
    #lib-loading.is-hidden { display: none; }
    .loading__dot { width: 8px; height: 8px; background: #1a1a1a; border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }
    .loading__text { font-size: 13px; color: #666; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div id="lib-gate">
    <div class="lib-gate__inner">
      <h2 class="lib-gate__logo">LIB</h2>
      <p class="lib-gate__lead">パスワードを入力してください</p>
      <input type="password" id="lib-gate-pw" class="lib-gate__input" autocomplete="current-password" />
      <button id="lib-gate-btn" class="lib-gate__btn" onclick="libGateLogin()">ログイン</button>
      <div id="lib-gate-err" class="lib-gate__err" hidden></div>
    </div>
  </div>

  <!-- ローディング (iframe ロード完了で is-hidden 付与) -->
  <div id="lib-loading" class="is-hidden">
    <div class="loading__dot"></div>
    <div class="loading__text">マスタを読み込み中</div>
  </div>

  <iframe id="app-iframe" allow="clipboard-read; clipboard-write; camera; microphone"></iframe>

  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbxdq13NlTczt5qRbGuDMEFpzr-LdSs87JIyeTCeCNuqqhscb3i7yCcNeH4W9DiG-9x5/exec';
    const GATE_KEY = 'lib_access_v1';
    const SETUP_KEY = 'lib_setup_v1';

    function todayKey() { return new Date().toDateString(); }

    function buildAppUrl() {
      const setup = localStorage.getItem(SETUP_KEY);
      if (!setup) return APP_URL;
      const sep = APP_URL.includes('?') ? '&' : '?';
      return APP_URL + sep + 'setup=' + encodeURIComponent(setup);
    }

    function showApp() {
      const gateEl = document.getElementById('lib-gate');
      if (gateEl) gateEl.remove();

      const loadingEl = document.getElementById('lib-loading');
      if (loadingEl) loadingEl.classList.remove('is-hidden');

      const iframe = document.getElementById('app-iframe');
      iframe.addEventListener('load', function() {
        if (loadingEl) loadingEl.classList.add('is-hidden');
      }, { once: true });

      iframe.src = buildAppUrl();
      iframe.style.display = 'block';
    }

    // 起動時チェック: 今日ログイン済みなら自動ログイン
    (function() {
      if (localStorage.getItem(GATE_KEY) === todayKey()) {
        showApp();
      }
    })();

    // iframe からの setup 保存メッセージを受信
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'lib_save_setup' && e.data.setup) {
        try { localStorage.setItem(SETUP_KEY, JSON.stringify(e.data.setup)); } catch(_){}
      }
    });

    window.libGateLogin = async function() {
      const pw = document.getElementById('lib-gate-pw').value;
      const errEl = document.getElementById('lib-gate-err');
      errEl.setAttribute('hidden', '');
      try {
        const url = APP_URL + '?action=verify&pw=' + encodeURIComponent(pw);
        const res = await fetch(url).then(r => r.json());
        if (res && res.ok) {
          localStorage.setItem(GATE_KEY, todayKey());
          showApp();
        } else {
          errEl.textContent = 'パスワードが違います';
          errEl.removeAttribute('hidden');
        }
      } catch (e) {
        errEl.textContent = 'エラー: ' + (e.message || e);
        errEl.removeAttribute('hidden');
      }
    };

    document.getElementById('lib-gate-pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('lib-gate-btn').click();
    });
  </script>
</body>
</html>
