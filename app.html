<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LIBヒアリング" />
<meta name="theme-color" content="#1a1a1a" />
<link rel="icon" type="image/png" href="lib-icon.png" />
<link rel="apple-touch-icon" href="lib-icon.png" />
<title>LIB 商品ヒアリング</title>
<style>
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    height:100%;
    background:#fff;
    color:#1a1a1a;
    font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
    font-size:15px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  button { font-family:inherit; font-size:inherit; color:inherit; background:none; border:none; cursor:pointer; }
  input { font-family:inherit; font-size:inherit; color:inherit; }

  #app-iframe { display:none; width:100%; height:100%; border:0; }

  /* ===== パスワードゲート ===== */
  #lib-gate {
    position:fixed; inset:0; z-index:200;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .lib-gate__card { width:100%; max-width:360px; text-align:center; }
  .lib-gate__logo {
    font-family:'Times New Roman',serif;
    font-size:38px;
    letter-spacing:0.2em;
    color:#1a1a1a;
    padding:0 0 4px;
  }
  .lib-gate__sub {
    font-size:13px;
    color:#999;
    letter-spacing:0.1em;
    margin-bottom:36px;
  }
  .lib-gate__input {
    width:100%;
    padding:14px 16px;
    font-size:15px;
    color:#1a1a1a;
    background:#fff;
    border:1px solid #e5e5e5;
    border-radius:0;
    outline:none;
    margin-bottom:12px;
    transition:border-color .15s;
  }
  .lib-gate__input:focus { border-color:#1a1a1a; }
  .lib-gate__btn {
    width:100%;
    padding:14px 16px;
    font-size:14px;
    font-weight:500;
    letter-spacing:0.15em;
    color:#fff;
    background:#1a1a1a;
    border:0;
    border-radius:0;
    cursor:pointer;
    transition:opacity .15s;
  }
  .lib-gate__btn:active { opacity:.7; }
  .lib-gate__err {
    color:#c62828;
    font-size:12px;
    letter-spacing:0.05em;
    margin-top:12px;
    min-height:16px;
  }

  /* ===== ローディング (web app と完全一致) ===== */
  #lib-loading {
    position:fixed; inset:0; z-index:100;
    background:rgba(255,255,255,.92);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px;
  }
  #lib-loading.is-hidden { display:none; }
  .loading__dot {
    width:8px; height:8px;
    background:#1a1a1a;
    border-radius:50%;
    animation:pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity:.3; }
    50%      { opacity:1;  }
  }
  .loading__text {
    font-size:13px;
    color:#666;
    letter-spacing:0.1em;
  }
</style>
</head>
<body>

<!-- パスワードゲート -->
<div id="lib-gate">
  <div class="lib-gate__card">
    <div class="lib-gate__logo">LIB</div>
    <div class="lib-gate__sub">商品ヒアリング</div>
    <input id="lib-gate-pw" class="lib-gate__input" type="password" autocomplete="off" placeholder="パスワード" />
    <button id="lib-gate-btn" class="lib-gate__btn" type="button">ログイン</button>
    <div id="lib-gate-err" class="lib-gate__err"></div>
  </div>
</div>

<!-- ローディング (web app の #loading と同じ構造) -->
<div id="lib-loading" class="is-hidden">
  <div class="loading__dot"></div>
  <div class="loading__text">マスタを読み込み中</div>
</div>

<!-- 本体 iframe -->
<iframe id="app-iframe" allow="microphone; clipboard-read; clipboard-write" allowfullscreen></iframe>

<script>
(function(){
  var APP_URL   = 'https://script.google.com/macros/s/AKfycbx7Pc2sxYFYFRWGxQF0_ugZU1P22VZj70MEpjY4gopNS2KgiIKlXUmfPz2UHNQBAzp-/exec';
  var GATE_KEY  = 'lib_gate_date';
  var SETUP_KEY = 'lib_setup';

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
  }
  function isLoggedInToday() {
    try { return localStorage.getItem(GATE_KEY) === todayStr(); } catch(_){ return false; }
  }
  function markLoggedInToday() {
    try { localStorage.setItem(GATE_KEY, todayStr()); } catch(_){}
  }
  function loadSetup() {
    try { var raw = localStorage.getItem(SETUP_KEY); return raw ? JSON.parse(raw) : null; }
    catch(_){ return null; }
  }
  function saveSetup(obj) {
    try { localStorage.setItem(SETUP_KEY, JSON.stringify(obj || {})); } catch(_){}
  }
  function buildAppUrl() {
    var setup = loadSetup();
    if (setup && (setup.店舗名 || setup.スタッフ名)) {
      return APP_URL + '?setup=' + encodeURIComponent(JSON.stringify(setup));
    }
    return APP_URL;
  }

  function showApp() {
    var gate = document.getElementById('lib-gate');
    if (gate) gate.remove();

    var loading = document.getElementById('lib-loading');
    if (loading) loading.classList.remove('is-hidden');

    var iframe = document.getElementById('app-iframe');
    iframe.addEventListener('load', function(){
      if (loading) loading.classList.add('is-hidden');
    }, { once: true });

    iframe.src = buildAppUrl();
    iframe.style.display = 'block';
  }

  function showError(msg) {
    var el = document.getElementById('lib-gate-err');
    if (el) el.textContent = msg || '';
  }

  function login() {
    var pw = (document.getElementById('lib-gate-pw') || {}).value || '';
    if (!pw) { showError('パスワードを入力してください'); return; }
    showError('確認中…');
    fetch(APP_URL + '?action=verify&pw=' + encodeURIComponent(pw), { method:'GET' })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res && res.ok) { markLoggedInToday(); showApp(); }
        else { showError(res && res.error === 'NOT_CONFIGURED' ? 'パスワードが設定されていません' : 'パスワードが違います'); }
      })
      .catch(function(){ showError('通信エラーが発生しました'); });
  }

  window.__libGateLogin = login;

  document.addEventListener('DOMContentLoaded', function(){
    document.getElementById('lib-gate-btn').addEventListener('click', login);
    document.getElementById('lib-gate-pw').addEventListener('keydown', function(e){
      if (e.key === 'Enter') login();
    });
    if (isLoggedInToday()) showApp();
  });

  window.addEventListener('message', function(e){
    var data = e && e.data;
    if (!data || typeof data !== 'object') return;
    if (data.type === 'lib_save_setup' && data.setup) saveSetup(data.setup);
  });
})();
</script>

</body>
</html>
