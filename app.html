<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LIB商品ヒアリング" />
<title>LIB商品ヒアリング</title>
<style>
  html, body {
    margin:0; padding:0; height:100%;
    background:#fff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
    color:#222;
  }
  #app-iframe { display:none; width:100%; height:100%; border:0; }

  /* ===== パスワードゲート ===== */
  #lib-gate {
    position:fixed; inset:0; z-index:9999;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .lib-gate__card { width:100%; max-width:360px; text-align:center; }
  .lib-gate__brand {
    font-size:28px; font-weight:700; letter-spacing:2px;
    color:#222; margin:0 0 6px;
  }
  .lib-gate__title {
    font-size:14px; color:#666; margin:0 0 24px;
  }
  .lib-gate__input {
    width:100%; box-sizing:border-box;
    padding:12px 14px; font-size:16px;
    border:1px solid #d0d0d0; border-radius:10px;
    margin-bottom:10px;
  }
  .lib-gate__btn {
    width:100%; box-sizing:border-box;
    padding:12px 14px; font-size:16px; font-weight:600;
    color:#fff; background:#222; border:0; border-radius:10px;
    cursor:pointer;
  }
  .lib-gate__btn:active { opacity:.85; }
  .lib-gate__err { color:#c62828; font-size:13px; margin-top:8px; min-height:18px; }

  /* ===== ローディング画面 (web app 風) ===== */
  #lib-loading {
    position:fixed; inset:0; z-index:9998;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .lib-loading__inner { text-align:center; }
  .lib-loading__spinner {
    width:36px; height:36px;
    margin:0 auto 14px;
    border:3px solid #e5e5e5;
    border-top-color:#222;
    border-radius:50%;
    animation: lib-spin 0.8s linear infinite;
  }
  .lib-loading__text { font-size:14px; color:#666; }
  @keyframes lib-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- パスワードゲート -->
<div id="lib-gate">
  <div class="lib-gate__card">
    <div class="lib-gate__brand">LIB</div>
    <div class="lib-gate__title">商品ヒアリング</div>
    <input id="lib-gate-pw" class="lib-gate__input" type="password" inputmode="text" autocomplete="off" placeholder="パスワードを入力" />
    <button id="lib-gate-btn" class="lib-gate__btn" type="button">ログイン</button>
    <div id="lib-gate-err" class="lib-gate__err"></div>
  </div>
</div>

<!-- ローディング画面 -->
<div id="lib-loading" hidden>
  <div class="lib-loading__inner">
    <div class="lib-loading__spinner"></div>
    <div class="lib-loading__text">マスタを読み込み中…</div>
  </div>
</div>

<!-- 本体 iframe -->
<iframe id="app-iframe" allow="microphone; clipboard-read; clipboard-write" allowfullscreen></iframe>

<script>
(function(){
  var APP_URL   = 'https://script.google.com/macros/s/AKfycbx7Pc2sxYFYFRWGxQF0_ugZU1P22VZj70MEpjY4gopNS2KgiIKlXUmfPz2UHNQBAzp-/exec';
  var GATE_KEY  = 'lib_gate_date';
  var SETUP_KEY = 'lib_setup';

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
  }
  function isLoggedInToday() {
    try { return localStorage.getItem(GATE_KEY) === todayStr(); } catch(_){ return false; }
  }
  function markLoggedInToday() {
    try { localStorage.setItem(GATE_KEY, todayStr()); } catch(_){}
  }
  function loadSetup() {
    try { var raw = localStorage.getItem(SETUP_KEY); return raw ? JSON.parse(raw) : null; }
    catch(_){ return null; }
  }
  function saveSetup(obj) {
    try { localStorage.setItem(SETUP_KEY, JSON.stringify(obj || {})); } catch(_){}
  }
  function buildAppUrl() {
    var setup = loadSetup();
    if (setup && (setup.店舗名 || setup.スタッフ名)) {
      return APP_URL + '?setup=' + encodeURIComponent(JSON.stringify(setup));
    }
    return APP_URL;
  }

  function showApp() {
    var gate = document.getElementById('lib-gate');
    if (gate) gate.remove();

    var loading = document.getElementById('lib-loading');
    if (loading) loading.removeAttribute('hidden');

    var iframe = document.getElementById('app-iframe');
    iframe.addEventListener('load', function(){
      if (loading) loading.style.display = 'none';
    }, { once: true });

    iframe.src = buildAppUrl();
    iframe.style.display = 'block';
  }

  function showError(msg) {
    var el = document.getElementById('lib-gate-err');
    if (el) el.textContent = msg || '';
  }

  function login() {
    var pw = (document.getElementById('lib-gate-pw') || {}).value || '';
    if (!pw) { showError('パスワードを入力してください'); return; }
    showError('確認中…');
    fetch(APP_URL + '?action=verify&pw=' + encodeURIComponent(pw), { method:'GET' })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res && res.ok) { markLoggedInToday(); showApp(); }
        else { showError(res && res.error === 'NOT_CONFIGURED' ? 'パスワードが設定されていません' : 'パスワードが違います'); }
      })
      .catch(function(){ showError('通信エラーが発生しました'); });
  }

  window.__libGateLogin = login;

  document.addEventListener('DOMContentLoaded', function(){
    document.getElementById('lib-gate-btn').addEventListener('click', login);
    document.getElementById('lib-gate-pw').addEventListener('keydown', function(e){
      if (e.key === 'Enter') login();
    });
    if (isLoggedInToday()) showApp();
  });

  window.addEventListener('message', function(e){
    var data = e && e.data;
    if (!data || typeof data !== 'object') return;
    if (data.type === 'lib_save_setup' && data.setup) saveSetup(data.setup);
  });
})();
</script>

</body>
</html>
