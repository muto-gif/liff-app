<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み取り中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #06C755;
      font-family: -apple-system, sans-serif;
    }
    .container { text-align: center; color: white; padding: 20px; }
    .status { font-size: 18px; margin: 20px 0; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">読み取り中...</div>
  </div>

  <script>
    const LIFF_ID = '2009796249-ctBI5RkH'; // ← 変更

    async function main() {
      const statusEl = document.getElementById('status');
      const spinnerEl = document.getElementById('spinner');

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // plateIdをURLパラメータから取得
        const plateId = getPlateId() || '不明';
        const userId = liff.getContext().userId;

        statusEl.textContent = '送信中...';

        // GASのdoPostにWebhook経由でデータを送る
        await liff.sendMessages([{
          type: 'text',
          text: '__SYSTEM__' + JSON.stringify({
            type: 'plate_scan',
            plateId: plateId,
            timestamp: new Date().toISOString()
          })
        }]);

        spinnerEl.style.display = 'none';
        statusEl.textContent = '✓ 完了しました！';

        setTimeout(() => liff.closeWindow(), 2000);

      } catch (error) {
        document.getElementById('spinner').style.display = 'none';
        statusEl.textContent = 'エラー: ' + error.message;
        console.error(error);
      }
    }

    function getPlateId() {
      // 方法1
      try {
        if (typeof liff.getQueryParam === 'function') {
          return liff.getQueryParam('plate');
        }
      } catch(e) {}
      // 方法2
      return new URLSearchParams(window.location.search).get('plate');
    }

    main();
  </script>
</body>
</html>
