<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み取り中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #06C755;
      font-family: -apple-system, sans-serif;
    }
    .container {
      text-align: center;
      color: white;
      padding: 20px;
    }
    .status {
      font-size: 18px;
      margin: 20px 0;
      line-height: 1.6;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .complete-container {
      display: none;
      text-align: center;
    }
    .thank-you {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 30px;
    }
    .divider {
      width: 80%;
      height: 1px;
      background: rgba(255,255,255,0.4);
      margin: 20px auto;
    }
    .friend-text {
      font-size: 15px;
      margin-bottom: 20px;
      line-height: 1.6;
      opacity: 0.95;
    }
    .add-friend-btn {
      display: inline-block;
      background: white;
      color: #06C755;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ローディング中 -->
    <div id="loading-container">
      <div class="spinner" id="spinner"></div>
      <div class="status" id="status"></div>
    </div>

    <!-- 完了画面 -->
    <div class="complete-container" id="complete-container">
      <div class="thank-you">ご来店ありがとうございます！</div>
      <div class="divider"></div>
      <p class="friend-text">
        📩 公式LINEを友だち追加すると<br>
        フィードバックへの返信をお届けします！
      </p>
      <a href="https://line.me/R/ti/p/@365qrlrc"
         class="add-friend-btn">
        友だち追加する
      </a>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009796249-ctBI5RkH'; // ← 変更
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqYYo23L_qQh6XLL-QvpcCYVAXXQHeRGoHvv1BFQPFEX9AJQWK7FCVmegLZSUnVMPz/exec'; // ← 変更

    async function main() {
      const statusEl  = document.getElementById('status');
      const spinnerEl = document.getElementById('spinner');

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const plateId = getPlateId() || '不明';
        const userId  = liff.getContext()?.userId;

        if (!userId) throw new Error('LINE IDが取得できませんでした');

        // バックグラウンドでデータ送信
        await sendData(userId, plateId);

      } catch (error) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').innerHTML =
          'エラー:<br>' + (error.message || 'unknown') +
          '<br>code: ' + (error.code || 'なし');
        console.error('LIFF Error:', error);
      }
    }

    async function sendData(userId, plateId) {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          events: [{
            type: 'message',
            timestamp: Date.now(),
            source: { userId: userId },
            message: {
              type: 'text',
              text: '__SYSTEM__' + JSON.stringify({
                type: 'plate_scan',
                plateId: plateId,
                timestamp: new Date().toISOString()
              })
            }
          }]
        })
      });

      // ローディングを非表示にして完了画面を表示
      document.getElementById('loading-container').style.display = 'none';
      document.getElementById('complete-container').style.display = 'block';
    }

    function getPlateId() {
      try {
        if (typeof liff.getQueryParam === 'function') {
          const val = liff.getQueryParam('plate');
          if (val) return val;
        }
      } catch(e) {}
      try {
        const val = new URLSearchParams(window.location.search).get('plate');
        if (val) return val;
      } catch(e) {}
      return null;
    }

    main();
  </script>
</body>
</html>
