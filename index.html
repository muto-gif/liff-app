<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み取り中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #06C755;
      font-family: -apple-system, sans-serif;
    }
    .container {
      text-align: center;
      color: white;
      padding: 20px;
    }
    .status {
      font-size: 18px;
      margin: 20px 0;
      line-height: 1.8;
      opacity: 0.95;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">
      しばらくお待ちください...
    </div>
  </div>

  <script>
    const LIFF_ID = '1507850629-0k0TqUiv';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqYYo23L_qQh6XLL-QvpcCYVAXXQHeRGoHvv1BFQPFEX9AJQWK7FCVmegLZSUnVMPz/exec';
    const LINE_OFFICIAL_ID = '@uaa8212p';

    async function main() {
      const statusEl  = document.getElementById('status');
      const spinnerEl = document.getElementById('spinner');

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // getProfile で userId + displayName + pictureUrl を取得
        const profile = await liff.getProfile();
        const userId      = profile.userId;
        const displayName = profile.displayName || '';

        if (!userId) throw new Error('LINE IDが取得できませんでした');

        const sessionId = getQueryParam('session');
        const plateId   = getQueryParam('plate');  // 旧プレートQR後方互換

        await sendData(userId, displayName, sessionId, plateId);

      } catch (error) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').innerHTML =
          'エラーが発生しました。<br>もう一度お試しください。';
        console.error('LIFF Error:', error);
      }
    }

    async function sendData(userId, displayName, sessionId, plateId) {
      const statusEl  = document.getElementById('status');
      const spinnerEl = document.getElementById('spinner');

      const payload = {
        type: 'plate_scan',
        timestamp: new Date().toISOString(),
        displayName: displayName || ''
      };
      if (sessionId) payload.sessionId = sessionId;
      if (plateId)   payload.plateId   = plateId;

      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          events: [{
            type: 'message',
            timestamp: Date.now(),
            source: { userId: userId },
            message: {
              type: 'text',
              text: '__SYSTEM__' + JSON.stringify(payload)
            }
          }]
        })
      });

      spinnerEl.style.display = 'none';
      statusEl.innerHTML =
        '公式LINEへ移動します...';

      setTimeout(function() {
        liff.openWindow({
          url: 'https://line.me/R/ti/p/' + LINE_OFFICIAL_ID,
          external: false
        });
      }, 1500);
    }

    // session, plate どちらも汎用的に取得
    function getQueryParam(key) {
      try {
        if (typeof liff.getQueryParam === 'function') {
          const val = liff.getQueryParam(key);
          if (val) return val;
        }
      } catch(e) {}
      try {
        const val = new URLSearchParams(window.location.search).get(key);
        if (val) return val;
      } catch(e) {}
      return null;
    }

    main();
  </script>
</body>
</html>
