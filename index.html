<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み取り中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #06C755;
      font-family: -apple-system, sans-serif;
    }
    .container { text-align: center; color: white; padding: 20px; }
    .status { font-size: 18px; margin: 20px 0; line-height: 1.6; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">読み取り中...</div>
  </div>

  <script>
    const LIFF_ID = '2009796249-ctBI5RkH'; // ← 変更
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx5oZS7FCuqFzBDkqvrj4SBtebwv442NU5-OvovmbePSLXCjrQNbKcxKyoVwvxkbIM/exec'; // ← 変更（/execで終わるURL）

    async function main() {
      const statusEl = document.getElementById('status');
      const spinnerEl = document.getElementById('spinner');

      try {
        statusEl.textContent = '初期化中...';
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        statusEl.textContent = 'データ取得中...';
        const plateId = getPlateId() || '不明';
        const userId = liff.getContext()?.userId;

        if (!userId) throw new Error('LINE IDが取得できませんでした');

        statusEl.textContent = '送信中...';

        // GASに直接fetchで送信（no-cors：レスポンスは読めないが送信は届く）
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            events: [{
              type: 'message',
              timestamp: Date.now(),
              source: { userId: userId },
              message: {
                type: 'text',
                text: '__SYSTEM__' + JSON.stringify({
                  type: 'plate_scan',
                  plateId: plateId,
                  timestamp: new Date().toISOString()
                })
              }
            }]
          })
        });

        // fetchはno-corsのためレスポンス確認不可
        // → 一定時間後にシートを確認する必要あり
        spinnerEl.style.display = 'none';
        statusEl.textContent = '✓ 完了しました！';
        setTimeout(() => liff.closeWindow(), 2000);

      } catch (error) {
        spinnerEl.style.display = 'none';
        statusEl.innerHTML =
          'エラー:<br>' + (error.message || 'unknown') +
          '<br>code: ' + (error.code || 'なし');
        console.error('LIFF Error:', error);
      }
    }

    function getPlateId() {
      try {
        if (typeof liff.getQueryParam === 'function') {
          const val = liff.getQueryParam('plate');
          if (val) return val;
        }
      } catch(e) {}
      try {
        return new URLSearchParams(window.location.search).get('plate');
      } catch(e) {}
      return null;
    }

    main();
  </script>
</body>
</html>
