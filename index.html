<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み取り中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #06C755;
      font-family: -apple-system, sans-serif;
    }
    .container {
      text-align: center;
      color: white;
      padding: 20px;
    }
    .status {
      font-size: 18px;
      margin: 20px 0;
      line-height: 1.6;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .add-friend-btn {
      display: inline-block;
      background: white;
      color: #06C755;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      margin-top: 10px;
    }
    .add-friend-note {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status"></div>

    <!-- 友だち追加促進UI（初期非表示） -->
    <div id="add-friend-container" style="display:none;">
      <p style="font-size:18px; margin-bottom:20px; line-height:1.6;">
        📩 公式LINEを友だち追加すると<br>
        フィードバックへの返信をお届けします！
      </p>
      <a href="https://line.me/R/ti/p/@ここにボットのベーシックIDを入力"
         class="add-friend-btn">
        友だち追加する
      </a>
      <p class="add-friend-note">
        追加後、もう一度QRを読み込んでください
      </p>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009796249-ctBI5RkH'; // ← 変更
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqYYo23L_qQh6XLL-QvpcCYVAXXQHeRGoHvv1BFQPFEX9AJQWK7FCVmegLZSUnVMPz/exec'; // ← 変更

    async function main() {
      const statusEl  = document.getElementById('status');
      const spinnerEl = document.getElementById('spinner');

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const plateId = getPlateId() || '不明';
        const userId  = liff.getContext()?.userId;

        if (!userId) throw new Error('LINE IDが取得できませんでした');

        // 友だち追加状態を確認
        const friendship = await liff.getFriendship();

        if (!friendship.friendFlag) {
          // 未追加 → 友だち追加画面を表示
          spinnerEl.style.display = 'none';
          document.getElementById('add-friend-container').style.display = 'block';
          return;
        }

        // 友だち追加済み → データ送信
        await sendData(userId, plateId);

      } catch (error) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').innerHTML =
          'エラー:<br>' + (error.message || 'unknown') +
          '<br>code: ' + (error.code || 'なし');
        console.error('LIFF Error:', error);
      }
    }

    async function sendData(userId, plateId) {
      const spinnerEl = document.getElementById('spinner');
      const statusEl  = document.getElementById('status');

      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          events: [{
            type: 'message',
            timestamp: Date.now(),
            source: { userId: userId },
            message: {
              type: 'text',
              text: '__SYSTEM__' + JSON.stringify({
                type: 'plate_scan',
                plateId: plateId,
                timestamp: new Date().toISOString()
              })
            }
          }]
        })
      });

      spinnerEl.style.display = 'none';
      statusEl.textContent = 'ご来店ありがとうございます！';
      setTimeout(() => liff.closeWindow(), 2000);
    }

    function getPlateId() {
      try {
        if (typeof liff.getQueryParam === 'function') {
          const val = liff.getQueryParam('plate');
          if (val) return val;
        }
      } catch(e) {}
      try {
        const val = new URLSearchParams(window.location.search).get('plate');
        if (val) return val;
      } catch(e) {}
      return null;
    }

    main();
  </script>
</body>
</html>
